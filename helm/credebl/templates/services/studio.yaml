---
# Studio — Next.js web UI.
# IMPORTANT: Studio bakes NEXT_PUBLIC_* environment variables at IMAGE BUILD TIME.
# The image must be pre-built with the correct domain before deploying.
# Build it with: docker build --build-arg NEXT_PUBLIC_BASE_URL=https://api.example.com/v1 ...
# Then push to your registry and set credebl.studioImage in values.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: studio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
    app.kubernetes.io/component: studio
spec:
  replicas: {{ .Values.services.studio.replicaCount }}
  selector:
    matchLabels:
      app: studio
  template:
    metadata:
      labels:
        app: studio
    spec:
      initContainers:
        - name: wait-api-gateway
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z api-gateway 5000; do sleep 3; done']
      containers:
        - name: studio
          image: {{ .Values.credebl.studioImage | default (printf "%s/studio:%s" .Values.global.imageRegistry .Values.global.imageTag) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: CRYPTO_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: CRYPTO_PRIVATE_KEY
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: NEXTAUTH_SECRET
            - name: NEXTAUTH_URL
              value: {{ include "credebl.studioUrl" . | quote }}
            - name: NEXTAUTH_COOKIE_DOMAIN
              value: {{ .Values.credebl.nextauthCookieDomain | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 10
          resources:
            {{- toYaml .Values.services.studio.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: studio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
spec:
  selector:
    app: studio
  ports:
    - port: 3000
      targetPort: 3000
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.studioHost | default (printf "studio.%s" .Values.global.domain) | quote }}
      secretName: tls-studio
  {{- end }}
  rules:
    - host: {{ .Values.ingress.studioHost | default (printf "studio.%s" .Values.global.domain) | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: studio
                port:
                  number: 3000
{{- end }}
