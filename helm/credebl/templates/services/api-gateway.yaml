---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  replicas: {{ .Values.services.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      {{- include "credebl.hostAliases" . | nindent 6 }}
      initContainers:
        - name: wait-nats
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z nats 4222; do sleep 2; done']
        - name: wait-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "credebl.redisHost" . }} {{ if .Values.redis.enabled }}6379{{ else }}{{ .Values.externalRedis.port }}{{ end }}; do sleep 2; done']
      containers:
        - name: api-gateway
          image: {{ .Values.global.imageRegistry }}/api-gateway:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 5000
          env:
            {{- include "credebl.commonEnv" . | nindent 12 }}
            - name: OOB_BATCH_SIZE
              value: "50"
            - name: PROOF_REQ_CONN_LIMIT
              value: "50"
            - name: ENABLE_CORS_IP_LIST
              value: {{ printf "%s://%s,%s://studio.%s" .Values.credebl.appProtocol (include "credebl.apiEndpoint" .) .Values.credebl.appProtocol .Values.global.domain | quote }}
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.services.apiGateway.resources | nindent 12 }}
{{- if .Values.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
spec:
  selector:
    app: api-gateway
  ports:
    - port: 5000
      targetPort: 5000
{{- if .Values.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.apiHost | default (printf "api.%s" .Values.global.domain) | quote }}
      secretName: tls-api-gateway
  {{- end }}
  rules:
    - host: {{ .Values.ingress.apiHost | default (printf "api.%s" .Values.global.domain) | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 5000
{{- end }}
