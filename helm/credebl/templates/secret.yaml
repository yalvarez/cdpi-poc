{{/*
Main K8s Secret — contains all CREDEBL platform credentials.
When credebl.existingSecret is set, this Secret is NOT created and
all services reference the user-provided secret instead.
*/}}
{{- if not .Values.credebl.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: credebl-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Database ────────────────────────────────────────────────────────────────
  POSTGRES_USER: {{ if .Values.postgres.enabled }}"credebl"{{ else }}{{ .Values.externalDatabase.user | quote }}{{ end }}
  POSTGRES_DB: {{ if .Values.postgres.enabled }}"credebl"{{ else }}{{ .Values.externalDatabase.name | quote }}{{ end }}
  POSTGRES_PASSWORD: {{ if .Values.postgres.enabled }}"credeblPG123"{{ else }}"$(kubectl get secret {{ .Values.externalDatabase.existingSecret }} -o jsonpath='{.data.POSTGRES_PASSWORD}' | base64 -d)"{{ end }}
  DATABASE_URL: "postgresql://{{ if .Values.postgres.enabled }}credebl:credeblPG123@postgres:5432/credebl{{ else }}{{ .Values.externalDatabase.user }}:REPLACE_WITH_PASSWORD@{{ .Values.externalDatabase.host }}:{{ .Values.externalDatabase.port }}/{{ .Values.externalDatabase.name }}{{ end }}"

  # ── Keycloak / OIDC ─────────────────────────────────────────────────────────
  KEYCLOAK_ADMIN_USER: {{ if .Values.keycloak.enabled }}{{ .Values.keycloak.adminUser | quote }}{{ else }}"n/a"{{ end }}
  KEYCLOAK_ADMIN_PASSWORD: "credeblKK123"
  KEYCLOAK_CLIENT_SECRET: "credebl-client-secret-change-me"

  # ── MinIO / S3 ──────────────────────────────────────────────────────────────
  MINIO_ROOT_USER: "minioadmin"
  MINIO_ROOT_PASSWORD: "credeblMINIO123"
  AWS_ACCESS_KEY_ID: "credebls3"
  AWS_SECRET_ACCESS_KEY: "credeblS3123"

  # ── SMTP / SendGrid ─────────────────────────────────────────────────────────
  SENDGRID_API_KEY: "mailpit-mock"

  # ── CREDEBL platform ────────────────────────────────────────────────────────
  CRYPTO_PRIVATE_KEY: {{ .Values.credebl.cryptoPrivateKey | quote }}
  JWT_SECRET: {{ .Values.credebl.jwtSecret | quote }}
  JWT_TOKEN_SECRET: {{ .Values.credebl.jwtTokenSecret | quote }}
  NEXTAUTH_SECRET: {{ .Values.credebl.nextauthSecret | quote }}
  PLATFORM_ADMIN_EMAIL: {{ .Values.credebl.platformAdminEmail | quote }}
  PLATFORM_ADMIN_INITIAL_PASSWORD: {{ .Values.credebl.platformAdminInitialPassword | quote }}
  AGENT_API_KEY: {{ .Values.credebl.agentApiKey | quote }}
  PLATFORM_SEED: {{ .Values.credebl.platformSeed | default "" | quote }}
{{- end }}
