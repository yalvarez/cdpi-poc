---
# platform-admin-bootstrap — syncs platform admin credentials from Keycloak
# into the CREDEBL database after seed completes.
apiVersion: batch/v1
kind: Job
metadata:
  name: platform-admin-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-seed
          image: busybox:1.36
          # Wait for the seed job to have populated the DB (checks for platform_config table)
          command:
            - sh
            - -c
            - |
              until PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U credebl -d credebl \
                -c "SELECT 1 FROM platform_config LIMIT 1" >/dev/null 2>&1; do
                echo "waiting for seed to complete..."; sleep 5
              done
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: POSTGRES_PASSWORD
      containers:
        - name: bootstrap
          image: postgres:16-alpine
          command:
            - /bin/sh
            - /scripts/bootstrap-platform-admin.sh
          env:
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_USER
              value: "credebl"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "credebl"
            - name: KEYCLOAK_DOMAIN
              value: "http://keycloak:8080/"
            - name: KEYCLOAK_ADMIN_URL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_ADMIN_USER
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KEYCLOAK_REALM
              value: {{ .Values.credebl.keycloakRealm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.credebl.keycloakClientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: KEYCLOAK_CLIENT_SECRET
            - name: PLATFORM_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: PLATFORM_ADMIN_EMAIL
            - name: PLATFORM_ADMIN_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: PLATFORM_ADMIN_INITIAL_PASSWORD
            - name: CRYPTO_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: CRYPTO_PRIVATE_KEY
          volumeMounts:
            - name: bootstrap-script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: bootstrap-script
          configMap:
            name: bootstrap-script
            defaultMode: 0755
