---
# Seed job — runs Prisma migrations + seeds master table data.
# Runs once on install; Helm's hook system re-runs it on upgrade if needed.
apiVersion: batch/v1
kind: Job
metadata:
  name: credebl-seed
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 3; done']
        - name: wait-keycloak
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z keycloak 8080; do echo waiting for keycloak; sleep 3; done']
      containers:
        - name: seed
          image: {{ .Values.global.imageRegistry }}/seed:{{ .Values.global.imageTag }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              mkdir -p /app/prisma/data
              ln -sfn /app/libs/prisma-service/prisma/data/geo-location-master-data \
                /app/prisma/data/geo-location-master-data
              npx prisma migrate deploy \
                --schema=./libs/prisma-service/prisma/schema.prisma
              npx ts-node ./libs/prisma-service/prisma/seed.ts
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: DATABASE_URL
            - name: KEYCLOAK_DOMAIN
              value: "http://keycloak:8080/"
            - name: KEYCLOAK_ADMIN_URL
              value: "http://keycloak:8080"
            - name: KEYCLOAK_ADMIN_USER
              value: {{ .Values.keycloak.adminUser | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KEYCLOAK_REALM
              value: {{ .Values.credebl.keycloakRealm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.credebl.keycloakClientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: KEYCLOAK_CLIENT_SECRET
            - name: KEYCLOAK_MANAGEMENT_CLIENT_ID
              value: {{ .Values.credebl.keycloakManagementClientId | quote }}
            - name: CRYPTO_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: CRYPTO_PRIVATE_KEY
            - name: PLATFORM_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: PLATFORM_ADMIN_EMAIL
            - name: PLATFORM_ADMIN_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: PLATFORM_ADMIN_INITIAL_PASSWORD
            - name: PLATFORM_SEED
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: PLATFORM_SEED
          volumeMounts:
            - name: master-table
              mountPath: /app/prisma/data/credebl-master-table
              readOnly: true
      volumes:
        - name: master-table
          configMap:
            name: credebl-master-table
