{{- if .Values.minio.enabled }}
---
# minio-setup job — creates buckets and access keys in MinIO after it starts.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-minio
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z minio 9000; do echo waiting for minio; sleep 3; done']
      containers:
        - name: minio-setup
          image: minio/mc:latest
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: AWS_ACCESS_KEY_ID
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credebl.existingSecret | default "credebl-secrets" }}
                  key: AWS_SECRET_ACCESS_KEY
          command:
            - /bin/sh
            - -ec
            - |
              mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
              mc mb --ignore-existing local/credebl-bucket
              mc mb --ignore-existing local/credebl-bucket/default
              mc mb --ignore-existing local/credebl-bucket/persist
              mc mb --ignore-existing local/credebl-bucket/orgLogos
              mc anonymous set public local/credebl-bucket/default
              mc anonymous set public local/credebl-bucket/orgLogos
              mc admin user info local "$MINIO_ACCESS_KEY" >/dev/null 2>&1 || \
                mc admin user add local "$MINIO_ACCESS_KEY" "$MINIO_SECRET_KEY"
              mc admin policy attach local readwrite --user "$MINIO_ACCESS_KEY"
              echo "MinIO setup complete"
{{- end }}
