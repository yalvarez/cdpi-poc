{{- if .Values.mailpit.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: {{ .Values.mailpit.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: smtp
              containerPort: 1025
            - name: ui
              containerPort: 8025
          resources:
            {{- toYaml .Values.mailpit.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "credebl.labels" . | nindent 4 }}
spec:
  selector:
    app: mailpit
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: ui
      port: 8025
      targetPort: 8025
{{- end }}
