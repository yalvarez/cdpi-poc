apiVersion: v2
name: credebl
description: >
  CREDEBL — Verifiable Credentials platform Helm chart.
  Packages all CREDEBL microservices with toggleable infrastructure
  (Postgres, Redis, NATS, Keycloak, MinIO, Mailpit) that can be replaced
  with managed cloud equivalents (RDS, ElastiCache, SES, S3, external OIDC).
