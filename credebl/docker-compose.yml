# =============================================================================
# CDPI PoC — CREDEBL Stack (Self-Contained)
# -----------------------------------------------------------------------------
# Replaces:  AWS S3   → MinIO   (S3-compatible, fully containerized)
#            SendGrid → Mailpit  (local SMTP, no external dependencies)
#            Keycloak → included (used as OIDC provider + mock)
#
# Excluded for PoC (non-critical for issuance/verification):
#   geolocation, notification, webhook
# Included here because Studio shared-wallet setup depends on it:
#   cloud-wallet
#
# RAM budget (~8GB VPS):
#   Infrastructure (postgres, redis, nats, keycloak, minio, mailpit) ~2.5GB
#   CREDEBL services (13 microservices)                              ~4.0GB
#   OS + Docker overhead                                             ~1.0GB
#   Buffer                                                           ~0.5GB
#
# Usage:
#   cp .env.example .env        # then fill in values
#   docker compose up -d
#   docker compose logs -f api-gateway
# =============================================================================

name: cdpi-credebl

# ---------------------------------------------------------------------------
# Infrastructure services
# ---------------------------------------------------------------------------
services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: credebl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-credebl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-credebl}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-credebl} -d ${POSTGRES_DB:-credebl}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: credebl-redis
    restart: unless-stopped
    # Keep Redis auth disabled in the self-contained PoC. Upstream CREDEBL's
    # Bull queue workers (including `issuance`) connect with host/port only and
    # do not pass REDIS_PASSWORD, which causes repeated `NOAUTH Authentication required` errors.
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── NATS ────────────────────────────────────────────────────────────────────
  nats:
    image: nats:2.10-alpine
    container_name: credebl-nats
    restart: unless-stopped
    command: ["--jetstream", "--store_dir=/data", "-m", "8222", "-DV"]
    volumes:
      - nats_data:/data
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Keycloak (OIDC provider + mock for PoC) ─────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: credebl-keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    env_file: .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-credebl}
      KC_DB_USERNAME: ${POSTGRES_USER:-credebl}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HTTP_PORT: 8080
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
    volumes:
      - ./config/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000; printf \"GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 768M

  # ── MinIO (S3-compatible — replaces AWS S3) ─────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: credebl-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── MinIO setup (creates buckets and access keys) ───────────────────────────
  minio-setup:
    image: minio/mc:latest
    container_name: credebl-minio-setup
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ACCESS_KEY: ${AWS_ACCESS_KEY_ID}
      MINIO_SECRET_KEY: ${AWS_SECRET_ACCESS_KEY}
      MINIO_BUCKET: ${S3_BUCKET_NAME:-credebl-bucket}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        : "$${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}"
        : "$${MINIO_ACCESS_KEY:?AWS_ACCESS_KEY_ID is required}"
        : "$${MINIO_SECRET_KEY:?AWS_SECRET_ACCESS_KEY is required}"
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}/default"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}/persist"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}/orgLogos"
        mc anonymous set public "local/$${MINIO_BUCKET}/default"
        mc anonymous set public "local/$${MINIO_BUCKET}/orgLogos"
        mc admin user info local "$${MINIO_ACCESS_KEY}" >/dev/null 2>&1 || \
          mc admin user add local "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"
        mc admin policy attach local readwrite --user "$${MINIO_ACCESS_KEY}"
        echo 'MinIO setup complete'
    networks:
      - credebl-net

  # ── Mailpit (SMTP mock — replaces SendGrid) ─────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: credebl-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — view sent emails at http://VPS_IP:8025
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Schema File Server ──────────────────────────────────────────────────────
  schema-file-server:
    image: ghcr.io/credebl/schema-file-server:latest
    container_name: credebl-schema-file-server
    restart: unless-stopped
    env_file: .env
    environment:
      # schema-file-server expects CRYPTO_PRIVATE_KEY as base64-encoded string.
      # Other services use the raw value from .env directly.
      # This is base64("cdpi-poc-crypto-key-change-me")
      CRYPTO_PRIVATE_KEY: "Y2RwaS1wb2MtY3J5cHRvLWtleS1jaGFuZ2UtbWU="
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ---------------------------------------------------------------------------
  # CREDEBL Platform services
  # ---------------------------------------------------------------------------

  # ── Seed (runs once, populates DB, then exits) ──────────────────────────────
  seed:
    image: ghcr.io/credebl/seed:latest
    container_name: credebl-seed
    restart: "no"
    user: "0:0"
    command: >
      sh -c 'mkdir -p /app/prisma/data &&
      ln -sfn /app/libs/prisma-service/prisma/data/geo-location-master-data /app/prisma/data/geo-location-master-data &&
      npx prisma migrate deploy --schema=./libs/prisma-service/prisma/schema.prisma &&
      npx ts-node ./libs/prisma-service/prisma/seed.ts'
    env_file: .env
    volumes:
      - ./config/credebl-master-table.json:/app/prisma/data/credebl-master-table/credebl-master-table.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - credebl-net

  # ── Platform admin bootstrap sync ───────────────────────────────────────────
  platform-admin-bootstrap:
    image: postgres:16-alpine
    container_name: credebl-platform-admin-bootstrap
    restart: "no"
    env_file: .env
    entrypoint:
      - /bin/sh
      - -c
      - apk add --no-cache curl jq >/dev/null && /bin/sh /work/bootstrap-platform-admin.sh
    volumes:
      - ../scripts/bootstrap-platform-admin.sh:/work/bootstrap-platform-admin.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 128M

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    image: ghcr.io/credebl/api-gateway:latest
    container_name: credebl-api-gateway
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:5000/',(r)=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Studio (web UI built from local source) ────────────────────────────────
  studio:
    build:
      context: ./studio
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MODE: ${NEXT_PUBLIC_MODE:-DEV}
        NEXT_PUBLIC_BASE_URL: ${API_GATEWAY_PROTOCOL:-http}://${API_ENDPOINT}
        NEXT_PUBLIC_ECOSYSTEM_FRONT_END_URL: ${STUDIO_URL:-http://YOUR_VPS_IP:3000}
        CRYPTO_PRIVATE_KEY: ${CRYPTO_PRIVATE_KEY}
        NEXT_PUBLIC_PLATFORM_NAME: ${PLATFORM_NAME:-CREDEBL}
        NEXTAUTH_URL: ${STUDIO_URL:-http://YOUR_VPS_IP:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
        NEXTAUTH_COOKIE_DOMAIN: ${NEXTAUTH_COOKIE_DOMAIN:-}
        NEXTAUTH_PROTOCOL: ${APP_PROTOCOL:-http}
        PUBLIC_ALLOW_DOMAIN: ${PUBLIC_ALLOW_DOMAIN:-http://YOUR_VPS_IP:5000 http://localhost:5000 http://localhost:3000 ws://YOUR_VPS_IP:5000 ws://localhost:5000}
        NEXT_PUBLIC_ENABLE_APP_LAUNCHER: ${NEXT_PUBLIC_ENABLE_APP_LAUNCHER:-false}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-CREDEBL}
        NEXT_PUBLIC_ENABLE_SOCIAL_LOGIN: ${NEXT_PUBLIC_ENABLE_SOCIAL_LOGIN:-false}
        NEXT_PUBLIC_ENABLE_BILLING_OPTION: ${NEXT_PUBLIC_ENABLE_BILLING_OPTION:-false}
        NEXT_PUBLIC_ACTIVE_THEME: ${NEXT_PUBLIC_ACTIVE_THEME:-credebl}
        NEXT_PUBLIC_APP_TITLE: ${NEXT_PUBLIC_APP_TITLE:-CREDEBL Studio}
        NEXT_PUBLIC_FOOTER_TEXT: ${NEXT_PUBLIC_FOOTER_TEXT:-CDPI PoC}
        NEXT_PUBLIC_LOGO_BASE_URL: ${NEXT_PUBLIC_LOGO_BASE_URL:-}
        NEXT_PUBLIC_ADMIN_PORTAL_CLIENT_ID: ${NEXT_PUBLIC_ADMIN_PORTAL_CLIENT_ID:-adminClient}
        NEXT_PUBLIC_LANDINGPAGE_URL: ${NEXT_PUBLIC_LANDINGPAGE_URL:-}
        OPENSSL_HEADER: ${OPENSSL_HEADER:-53616c7465645f5f}
        PUBLIC_ECOSYSTEM_BASE_URL: ${PUBLIC_ECOSYSTEM_BASE_URL:-}
        MODE: ${MODE:-DEV}
        NEXT_PUBLIC_CURRENT_RELEASE: ${NEXT_PUBLIC_CURRENT_RELEASE:-CDPI-PoC}
    container_name: credebl-studio
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_MODE: ${NEXT_PUBLIC_MODE:-DEV}
      NEXT_PUBLIC_BASE_URL: ${API_GATEWAY_PROTOCOL:-http}://${API_ENDPOINT}
      NEXT_PUBLIC_ECOSYSTEM_FRONT_END_URL: ${STUDIO_URL:-http://YOUR_VPS_IP:3000}
      CRYPTO_PRIVATE_KEY: ${CRYPTO_PRIVATE_KEY}
      NEXT_PUBLIC_PLATFORM_NAME: ${PLATFORM_NAME:-CREDEBL}
      NEXTAUTH_URL: ${STUDIO_URL:-http://YOUR_VPS_IP:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_COOKIE_DOMAIN: ${NEXTAUTH_COOKIE_DOMAIN:-}
      NEXTAUTH_PROTOCOL: ${APP_PROTOCOL:-http}
      PUBLIC_ALLOW_DOMAIN: ${PUBLIC_ALLOW_DOMAIN:-http://YOUR_VPS_IP:5000 http://localhost:5000 http://localhost:3000 ws://YOUR_VPS_IP:5000 ws://localhost:5000}
      NEXT_PUBLIC_ENABLE_APP_LAUNCHER: ${NEXT_PUBLIC_ENABLE_APP_LAUNCHER:-false}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-CREDEBL}
      NEXT_PUBLIC_ENABLE_SOCIAL_LOGIN: ${NEXT_PUBLIC_ENABLE_SOCIAL_LOGIN:-false}
      NEXT_PUBLIC_ENABLE_BILLING_OPTION: ${NEXT_PUBLIC_ENABLE_BILLING_OPTION:-false}
      NEXT_PUBLIC_ACTIVE_THEME: ${NEXT_PUBLIC_ACTIVE_THEME:-credebl}
      NEXT_PUBLIC_APP_TITLE: ${NEXT_PUBLIC_APP_TITLE:-CREDEBL Studio}
      NEXT_PUBLIC_FOOTER_TEXT: ${NEXT_PUBLIC_FOOTER_TEXT:-CDPI PoC}
      NEXT_PUBLIC_LOGO_BASE_URL: ${NEXT_PUBLIC_LOGO_BASE_URL:-}
      NEXT_PUBLIC_ADMIN_PORTAL_CLIENT_ID: ${NEXT_PUBLIC_ADMIN_PORTAL_CLIENT_ID:-adminClient}
      NEXT_PUBLIC_LANDINGPAGE_URL: ${NEXT_PUBLIC_LANDINGPAGE_URL:-}
      OPENSSL_HEADER: ${OPENSSL_HEADER:-53616c7465645f5f}
      PUBLIC_ECOSYSTEM_BASE_URL: ${PUBLIC_ECOSYSTEM_BASE_URL:-}
      MODE: ${MODE:-DEV}
      NEXT_PUBLIC_CURRENT_RELEASE: ${NEXT_PUBLIC_CURRENT_RELEASE:-CDPI-PoC}
    ports:
      - "3000:3000"
    depends_on:
      api-gateway:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      platform-admin-bootstrap:
        condition: service_completed_successfully
      agent-service:
        condition: service_started
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 768M

  # ── User service ────────────────────────────────────────────────────────────
  user:
    image: ghcr.io/credebl/user:latest
    container_name: credebl-user
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      platform-admin-bootstrap:
        condition: service_completed_successfully
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Utility service ─────────────────────────────────────────────────────────
  utility:
    image: ghcr.io/credebl/utility:latest
    container_name: credebl-utility
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Connection service ──────────────────────────────────────────────────────
  connection:
    image: ghcr.io/credebl/connection:latest
    container_name: credebl-connection
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      utility:
        condition: service_started
      user:
        condition: service_started
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Issuance service ────────────────────────────────────────────────────────
  issuance:
    image: ghcr.io/credebl/issuance:latest
    container_name: credebl-issuance
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      user:
        condition: service_started
      connection:
        condition: service_started
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Ledger service ──────────────────────────────────────────────────────────
  ledger:
    image: ghcr.io/credebl/ledger:latest
    container_name: credebl-ledger
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      user:
        condition: service_started
      connection:
        condition: service_started
      issuance:
        condition: service_started
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Organization service ────────────────────────────────────────────────────
  organization:
    image: ghcr.io/credebl/organization:latest
    container_name: credebl-organization
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      user:
        condition: service_started
      connection:
        condition: service_started
      issuance:
        condition: service_started
      ledger:
        condition: service_started
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Verification service ────────────────────────────────────────────────────
  verification:
    image: ghcr.io/credebl/verification:latest
    container_name: credebl-verification
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      user:
        condition: service_started
      connection:
        condition: service_started
      issuance:
        condition: service_started
      ledger:
        condition: service_started
      organization:
        condition: service_started
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Agent Provisioning ──────────────────────────────────────────────────────
  agent-provisioning:
    image: ghcr.io/credebl/agent-provisioning:latest
    container_name: credebl-agent-provisioning
    restart: unless-stopped
    env_file: .env
    environment:
      ROOT_PATH: /app/agent-provisioning/AFJ/agent-config
      AGENT_API_KEY: ${AGENT_API_KEY:-credeblagentkey}
      AFJ_AGENT_SPIN_UP: ${AFJ_AGENT_SPIN_UP:-/agent-provisioning/AFJ/scripts/docker_start_agent.sh}
      AFJ_AGENT_ENDPOINT_PATH: ${AFJ_AGENT_ENDPOINT_PATH:-/agent-provisioning/AFJ/endpoints/}
    volumes:
      - agent_config:/app/agent-provisioning/AFJ/agent-config
      - agent_token:/app/agent-provisioning/AFJ/token
      - ./config/agent.env:/app/agent.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
      organization:
        condition: service_started
      verification:
        condition: service_started
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Agent Service ───────────────────────────────────────────────────────────
  agent-service:
    image: ghcr.io/credebl/agent-service:latest
    container_name: credebl-agent-service
    restart: unless-stopped
    env_file: .env
    environment:
      PLATFORM_WALLET_NAME: ${PLATFORM_WALLET_NAME:-platformadminwallet}
      PLATFORM_WALLET_PASSWORD: ${PLATFORM_WALLET_PASSWORD:-platformadminwallet123}
      WALLET_STORAGE_HOST: ${WALLET_STORAGE_HOST:-postgres}
      WALLET_STORAGE_PORT: ${WALLET_STORAGE_PORT:-5432}
      WALLET_STORAGE_USER: ${WALLET_STORAGE_USER:-credebl}
      WALLET_STORAGE_PASSWORD: ${POSTGRES_PASSWORD}
      AGENT_PROTOCOL: ${AGENT_PROTOCOL:-http}
      AGENT_API_KEY: ${AGENT_API_KEY:-credeblagentkey}
      SOCKET_HOST: ${SOCKET_HOST:-http://api-gateway:5000}
    command: >
      sh -ec '
        : "${PLATFORM_WALLET_NAME:?PLATFORM_WALLET_NAME is required}";
        : "${PLATFORM_WALLET_PASSWORD:?PLATFORM_WALLET_PASSWORD is required}";
        : "${AGENT_API_KEY:?AGENT_API_KEY is required}";
        : "${WALLET_STORAGE_HOST:?WALLET_STORAGE_HOST is required}";
        : "${WALLET_STORAGE_PORT:?WALLET_STORAGE_PORT is required}";
        : "${WALLET_STORAGE_USER:?WALLET_STORAGE_USER is required}";
        : "${WALLET_STORAGE_PASSWORD:?WALLET_STORAGE_PASSWORD is required}";
        : "${SOCKET_HOST:?SOCKET_HOST is required}";
        until (docker logs credebl-agent-provisioning 2>&1 | grep "Agent-Provisioning-Service Microservice is listening to NATS"); do sleep 2; done;
        node dist/apps/agent-service/main.js
      '
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - agent_config:/app/agent-provisioning/AFJ/agent-config
      - agent_token:/app/agent-provisioning/AFJ/token
    depends_on:
      agent-provisioning:
        condition: service_started
      platform-admin-bootstrap:
        condition: service_completed_successfully
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Cloud Wallet (required for Studio shared-wallet / create-tenant) ──────
  cloud-wallet:
    image: ghcr.io/credebl/cloud-wallet:latest
    container_name: credebl-cloud-wallet
    restart: unless-stopped
    env_file: .env
    depends_on:
      nats:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    networks:
      - credebl-net
    deploy:
      resources:
        limits:
          memory: 256M

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nats_data:
    driver: local
  minio_data:
    driver: local
