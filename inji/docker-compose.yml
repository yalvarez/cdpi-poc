# =============================================================================
# CDPI PoC — INJI Stack (Self-Contained)
# -----------------------------------------------------------------------------
# Components:
#   inji-certify  → Credential issuance (OID4VCI, SD-JWT VC + W3C VCDM)
#   esignet       → Authorization Server (OIDC) — INJI's native auth layer
#   mimoto        → BFF for Inji Web Wallet
#   inji-web      → Web-based holder wallet
#   postgres      → Database (shared, schema-separated)
#   redis         → Cache (shared)
#
# Replaces:
#   External OIDC → eSignet (self-contained, OIDC-compliant)
#   External storage → local volumes only (INJI doesn't require S3)
#   SendGrid → Mailpit (if email flows are needed)
#
# RAM budget (~8GB VPS):
#   inji-certify  ~768MB (Spring Boot + SoftHSM)
#   esignet       ~512MB (Spring Boot)
#   mimoto        ~384MB (Spring Boot)
#   inji-web      ~128MB (Node/Nginx)
#   postgres      ~512MB
#   redis         ~128MB
#   mailpit       ~64MB
#   OS + Docker   ~1GB
#   Total         ~3.5GB (fits comfortably alongside CREDEBL)
#
# NOTE: inji-certify images are AMD64 only (no ARM64)
# On ARM machines (Apple Silicon): export DOCKER_DEFAULT_PLATFORM=linux/amd64
#
# Usage:
#   cp .env.example .env   # fill in values
#   docker compose up -d
#   docker compose logs -f inji-certify
# =============================================================================

name: cdpi-inji

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:14-alpine
    container_name: inji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-mosip_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"           # 5433 to avoid conflict with CREDEBL on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inji}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: inji-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"           # 6380 to avoid conflict with CREDEBL on 6379
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Mock Identity System (required by esignet-mock-plugin for UIN/OTP auth) ─
  mock-identity-system:
    image: mosipid/mock-identity-system:0.10.1
    container_name: inji-mock-identity-system
    user: root
    restart: unless-stopped
    environment:
      - active_profile_env=local
      - SPRING_CONFIG_LOCATION=/config/mockid/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mosip_db}?currentSchema=mockidentitysystem
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-inji}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - db.dbuser.password=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mosip_db}
      - POSTGRES_USER=${POSTGRES_USER:-inji}
      - CERTIFY_KEYSTORE_PASSWORD=${CERTIFY_KEYSTORE_PASSWORD}
      - MOSIP_MOCK_IDA_KYC_TRANSACTION_TIMEOUT_SECS=900
    volumes:
      - ./config/mock-identity-system:/config/mockid:ro
      - ./certs:/certs:ro
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/v1/mock-identity-system/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── eSignet (Authorization Server — OIDC) ──────────────────────────────────
  # eSignet is INJI's native OIDC provider. On Day 5, swap its issuer URL
  # for the country's real Authorization Server URL in .env.
  esignet:
    image: mosipid/esignet-with-plugins:1.5.1
    container_name: inji-esignet
    user: root
    restart: unless-stopped
    environment:
      - SPRING_CONFIG_LOCATION=/config/esignet/
      - active_profile_env=local
      - plugin_name_env=esignet-mock-plugin.jar
      - mosipbox_public_url=${PUBLIC_URL:-http://localhost}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-mosip_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - CERTIFY_KEYSTORE_PASSWORD=${CERTIFY_KEYSTORE_PASSWORD}
    volumes:
      - ./config/esignet:/config/esignet:ro
      - ./certs:/certs
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-identity-system:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Inji Certify (Credential Issuance — OID4VCI) ───────────────────────────
  inji-certify:
    image: mosipid/inji-certify-with-plugins:0.13.1
    container_name: inji-certify
    user: root
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=${CERTIFY_PROFILE:-default}
      - SPRING_CONFIG_LOCATION=/config/certify/
      - mosip.certify.database.hostname=postgres
      - mosip.certify.database.port=5432
      - mosip.certify.database.name=${POSTGRES_DB:-mosip_db}
      - db.dbuser.password=${POSTGRES_PASSWORD}
      - mosip.certify.authorization.url=http://esignet:8088
      - mosip.certify.domain.url=${PUBLIC_URL:-http://localhost}:8090
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - active_profile_env=${CERTIFY_PROFILE:-default}
      - POSTGRES_USER=${POSTGRES_USER:-inji}
      - CERTIFY_KEYSTORE_PASSWORD=${CERTIFY_KEYSTORE_PASSWORD}
      # PKCS12 keystore (same as eSignet — no SoftHSM in this image)
      - mosip.kernel.keymanager.hsm.config-path=/certs/oidckeystore.p12
      - mosip.kernel.keymanager.hsm.keystore-type=PKCS12
    volumes:
      - ./config/certify:/config/certify:ro
      - ./certs:/certs
      - certify_data:/home/mosip/certify
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      esignet:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8090/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 768M

  # ── Certify Nginx (reverse proxy for Certify — handles .well-known routing) ─
  certify-nginx:
    image: nginx:stable-alpine
    container_name: inji-certify-nginx
    restart: unless-stopped
    volumes:
      - ./config/nginx/certify.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8091:8091"
    depends_on:
      - inji-certify
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 64M

  # ── Mimoto Config Server (serves issuers/verifiers JSON via HTTP) ────────────
  # Mimoto's IssuersServiceImpl fetches config files via RestTemplate (HTTP only).
  # This nginx serves /config/mimoto/ so config.server.file.storage.uri can point
  # to http://mimoto-config-server/ instead of a remote GitHub URL.
  mimoto-config-server:
    image: nginx:stable-alpine
    container_name: inji-mimoto-config-server
    restart: unless-stopped
    volumes:
      - ./config/mimoto:/usr/share/nginx/html:ro
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 32M

  # ── Mimoto (BFF for Inji Web Wallet) ────────────────────────────────────────
  mimoto:
    image: mosipid/mimoto:0.19.2
    container_name: inji-mimoto
    user: root
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_CONFIG_LOCATION=/config/mimoto/
      - mosip.mimoto.database.hostname=postgres
      - mosip.mimoto.database.port=5432
      - mosip.mimoto.database.name=${POSTGRES_DB:-mosip_db}
      - db.dbuser.password=${POSTGRES_PASSWORD}
      - mosipbox_public_url=${PUBLIC_URL:-http://localhost}
      - POSTGRES_USER=${POSTGRES_USER:-inji}
      - CERTIFY_KEYSTORE_PASSWORD=${CERTIFY_KEYSTORE_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./config/mimoto:/config/mimoto:ro
      - ./certs:/certs:ro
      - mimoto_keystore:/home/mosip/encryption
    ports:
      - "8099:8099"
    depends_on:
      inji-certify:
        condition: service_healthy
      mimoto-config-server:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qSO /dev/null http://localhost:8099/residentmobileapp/actuator/health 2>&1 | grep -qE 'HTTP.*[24][0-9][0-9]'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      inji-net:
        aliases:
          - mimoto-service
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Inji Web (Web Wallet — holder interface) ────────────────────────────────
  inji-web:
    image: mosipid/inji-web:0.14.1
    container_name: inji-web
    restart: unless-stopped
    environment:
      - MIMOTO_HOST=http://mimoto:8099
      - ESIGNET_HOST=http://esignet:8088
      - DEFAULT_LANG=eng
    ports:
      - "3001:3004"
    depends_on:
      mimoto:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3004 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Mailpit (SMTP capture — for any email flows) ────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: inji-mailpit
    restart: unless-stopped
    ports:
      - "1026:1025"   # SMTP — 1026 to avoid conflict with CREDEBL on 1025
      - "8026:8025"   # Web UI — http://VPS_IP:8026
    networks:
      - inji-net
    deploy:
      resources:
        limits:
          memory: 64M

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certify_data:
    driver: local
  mimoto_keystore:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  inji-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
