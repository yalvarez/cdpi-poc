# Nginx reverse proxy for Inji Certify
# Handles .well-known endpoint routing as required by OID4VCI spec
# Port 8091 is the public-facing Certify port
#
# Key insight: certify's .well-known controller is at the ROOT context path
# (http://certify:8090/.well-known/...) not under the servlet path /v1/certify/.
# So nginx must proxy to the root path on certify, not to /v1/certify/.well-known/.

server {
    listen 8091;
    server_name _;

    # OID4VCI well-known at root (/.well-known/) → certify root context
    location /.well-known/openid-credential-issuer {
        proxy_pass http://inji-certify:8090/.well-known/openid-credential-issuer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin * always;
    }

    location /.well-known/openid-configuration {
        proxy_pass http://inji-certify:8090/.well-known/openid-configuration;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    # Well-known accessed under /v1/certify/.well-known/ path (e.g. from mimoto using credential_issuer URL)
    # Also routes to the root context on certify (not /v1/certify/.well-known/ which returns 404)
    location /v1/certify/.well-known/ {
        rewrite ^/v1/certify(/.well-known/.*)$ $1 break;
        proxy_pass http://inji-certify:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin * always;
    }

    # All other Certify API calls
    location /v1/certify/ {
        proxy_pass http://inji-certify:8090/v1/certify/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check — certify actuator is at root context, not under /v1/certify/
    location /health {
        proxy_pass http://inji-certify:8090/actuator/health;
        access_log off;
    }
}
