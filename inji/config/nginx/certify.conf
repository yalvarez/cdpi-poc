# Nginx reverse proxy for Inji Certify
# Handles .well-known endpoint routing as required by OID4VCI spec
# Port 8091 is the public-facing Certify port

server {
    listen 8091;
    server_name _;

    # OID4VCI well-known endpoints — must be at root level
    location /.well-known/openid-credential-issuer {
        proxy_pass http://inji-certify:8090/v1/certify/.well-known/openid-credential-issuer;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin * always;
    }

    location /.well-known/openid-configuration {
        proxy_pass http://inji-certify:8090/v1/certify/.well-known/openid-configuration;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin * always;
    }

    # All other Certify API calls
    location /v1/certify/ {
        proxy_pass http://inji-certify:8090/v1/certify/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check
    location /health {
        proxy_pass http://inji-certify:8090/v1/certify/actuator/health;
        access_log off;
    }
}
