# =============================================================================
# Inji Certify — Civil Identity Credential Configuration
# =============================================================================
# Credential type: CivilIdentity
# Format: SD-JWT VC (vc+sd-jwt)
# VCT: https://schemas.cdpi-poc.local/civil-identity/v1
#
# Usage (single-type deployment):
#   Set CERTIFY_PROFILE=civil-identity in docker-compose and rename this file
#   to application-civil-identity.properties. Spring Boot will load it for that
#   profile. Also comment out the combined blocks in application.properties.
#
# Default deployment:
#   All 4 credential types are configured in application.properties combined.
#   This file serves as reference and for single-type profile deployments.
#
# Privacy note: This is the most privacy-sensitive credential type. Most fields
# are SD (selectively disclosable) — holders can reveal only what each verifier
# actually needs (e.g., age_over_18 without revealing exact birthdate).
# =============================================================================

mosip.certify.plugin-mode=DataProvider
mosip.certify.credential-type=CivilIdentity
mosip.certify.supported.credential.scopes=CivilIdentity

mosip.certify.key-values={\
  'CivilIdentity':{\
    'format':'vc+sd-jwt',\
    'scope':'CivilIdentity',\
    'cryptographic_binding_methods_supported':['did:jwk','jwk'],\
    'credential_signing_alg_values_supported':['ES256'],\
    'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},\
    'vct':'https://schemas.cdpi-poc.local/civil-identity/v1',\
    'credential_definition':{\
      'type':['VerifiableCredential','CivilIdentity']\
    }\
  }\
}

mosip.certify.credential-display={\
  'CivilIdentity':[\
    {'name':'Civil Identity','locale':'en','background_color':'#854F0B','text_color':'#FFFFFF'},\
    {'name':'Identidad Civil','locale':'es','background_color':'#854F0B','text_color':'#FFFFFF'}\
  ]\
}

mosip.certify.claims-display={\
  'CivilIdentity':{\
    'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],\
    'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],\
    'document_number':[{'locale':'en','label':'Document Number'},{'locale':'es','label':'Número de Cédula'}],\
    'document_type':[{'locale':'en','label':'Document Type'},{'locale':'es','label':'Tipo de Documento'}],\
    'birthdate':[{'locale':'en','label':'Date of Birth'},{'locale':'es','label':'Fecha de Nacimiento'}],\
    'nationality':[{'locale':'en','label':'Nationality'},{'locale':'es','label':'Nacionalidad'}],\
    'gender':[{'locale':'en','label':'Gender'},{'locale':'es','label':'Sexo'}],\
    'age_over_18':[{'locale':'en','label':'Age 18+'},{'locale':'es','label':'Mayor de 18'}],\
    'age_over_21':[{'locale':'en','label':'Age 21+'},{'locale':'es','label':'Mayor de 21'}],\
    'address_municipality':[{'locale':'en','label':'Municipality'},{'locale':'es','label':'Municipio'}],\
    'address_province':[{'locale':'en','label':'Department'},{'locale':'es','label':'Departamento'}],\
    'credential_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}],\
    'issuing_authority':[{'locale':'en','label':'Issuing Authority'},{'locale':'es','label':'Autoridad Emisora'}]\
  }\
}

mosip.certify.sd-jwt.disclosable-claims={\
  'CivilIdentity':['full_name','document_expiry','birthdate','birthplace','birth_country','gender','age_over_18','age_over_21','age_over_65','address_street','address_municipality','address_province','address_country','address_postal_code','phone_number','email','marital_status','tax_id','registry_entry_number']\
}

# ── Data source (Mock CSV — default profile) ──────────────────────────────────
mosip.certify.mock.datasource.path=/config/certify/data/civil-identity-sample.csv

