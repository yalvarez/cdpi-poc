# =============================================================================
# Inji Certify — Professional License Credential Configuration
# =============================================================================
# Credential type: ProfessionalLicense
# Format: SD-JWT VC (vc+sd-jwt)
# VCT: https://schemas.cdpi-poc.local/professional-license/v1
#
# Usage (single-type deployment):
#   Set CERTIFY_PROFILE=professional-license in docker-compose and rename this
#   file to application-professional-license.properties. Spring Boot will load
#   it for that profile. Also comment out the combined blocks in application.properties.
#
# Default deployment:
#   All 4 credential types are configured in application.properties combined.
#   This file serves as reference and for single-type profile deployments.
# =============================================================================

mosip.certify.plugin-mode=DataProvider
mosip.certify.credential-type=ProfessionalLicense
mosip.certify.supported.credential.scopes=ProfessionalLicense

mosip.certify.key-values={\
  'ProfessionalLicense':{\
    'format':'vc+sd-jwt',\
    'scope':'ProfessionalLicense',\
    'cryptographic_binding_methods_supported':['did:jwk','jwk'],\
    'credential_signing_alg_values_supported':['ES256'],\
    'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},\
    'vct':'https://schemas.cdpi-poc.local/professional-license/v1',\
    'credential_definition':{\
      'type':['VerifiableCredential','ProfessionalLicense']\
    }\
  }\
}

mosip.certify.credential-display={\
  'ProfessionalLicense':[\
    {'name':'Professional License','locale':'en','background_color':'#3C3489','text_color':'#FFFFFF'},\
    {'name':'Licencia Profesional','locale':'es','background_color':'#3C3489','text_color':'#FFFFFF'}\
  ]\
}

mosip.certify.claims-display={\
  'ProfessionalLicense':{\
    'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],\
    'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],\
    'profession':[{'locale':'en','label':'Profession'},{'locale':'es','label':'Profesión'}],\
    'specialty':[{'locale':'en','label':'Specialty'},{'locale':'es','label':'Especialidad'}],\
    'license_number':[{'locale':'en','label':'License Number'},{'locale':'es','label':'Número de Licencia'}],\
    'issuing_body':[{'locale':'en','label':'Issuing Body'},{'locale':'es','label':'Entidad Emisora'}],\
    'license_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}],\
    'issue_date':[{'locale':'en','label':'Issue Date'},{'locale':'es','label':'Fecha de Emisión'}],\
    'expiry_date':[{'locale':'en','label':'Expiry Date'},{'locale':'es','label':'Fecha de Vencimiento'}]\
  }\
}

mosip.certify.sd-jwt.disclosable-claims={\
  'ProfessionalLicense':['birthdate','document_number','nationality','profession_code','issuing_body_id','last_renewal_date','practice_regions','sanctions_or_restrictions','qualification_basis']\
}

# ── Data source (Mock CSV — default profile) ──────────────────────────────────
mosip.certify.mock.datasource.path=/config/certify/data/professional-license-sample.csv

