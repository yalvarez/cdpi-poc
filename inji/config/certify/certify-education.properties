# =============================================================================
# Inji Certify — Educational Credential Configuration
# =============================================================================
# Credential type: EducationalCredential
# Format: SD-JWT VC (vc+sd-jwt)
# VCT: https://schemas.cdpi-poc.local/education/v1
#
# Usage (single-type deployment):
#   Set CERTIFY_PROFILE=education in docker-compose and rename this file to
#   application-education.properties — Spring Boot will load it for that profile.
#   Also comment out the key-values and display blocks in application.properties
#   to avoid the combined config overriding this one.
#
# Default deployment:
#   All 4 credential types are configured in application.properties combined.
#   This file serves as reference and for single-type profile deployments.
# =============================================================================

mosip.certify.plugin-mode=DataProvider
mosip.certify.credential-type=EducationalCredential
mosip.certify.supported.credential.scopes=EducationalCredential

mosip.certify.key-values={\
  'EducationalCredential':{\
    'format':'vc+sd-jwt',\
    'scope':'EducationalCredential',\
    'cryptographic_binding_methods_supported':['did:jwk','jwk'],\
    'credential_signing_alg_values_supported':['ES256'],\
    'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},\
    'vct':'https://schemas.cdpi-poc.local/education/v1',\
    'credential_definition':{\
      'type':['VerifiableCredential','EducationalCredential']\
    }\
  }\
}

mosip.certify.credential-display={\
  'EducationalCredential':[\
    {'name':'Educational Credential','locale':'en','background_color':'#27500A','text_color':'#FFFFFF'},\
    {'name':'Credencial Educativa','locale':'es','background_color':'#27500A','text_color':'#FFFFFF'}\
  ]\
}

mosip.certify.claims-display={\
  'EducationalCredential':{\
    'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],\
    'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],\
    'institution_name':[{'locale':'en','label':'Institution'},{'locale':'es','label':'Institución'}],\
    'credential_title':[{'locale':'en','label':'Degree / Title'},{'locale':'es','label':'Título / Grado'}],\
    'credential_level':[{'locale':'en','label':'Academic Level'},{'locale':'es','label':'Nivel Académico'}],\
    'field_of_study':[{'locale':'en','label':'Field of Study'},{'locale':'es','label':'Área de Estudio'}],\
    'graduation_date':[{'locale':'en','label':'Graduation Date'},{'locale':'es','label':'Fecha de Graduación'}],\
    'credential_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}]\
  }\
}

mosip.certify.sd-jwt.disclosable-claims={\
  'EducationalCredential':['birthdate','document_number','nationality','institution_id','institution_accreditation','program_code','enrollment_start_date','final_grade','honors','registration_number']\
}

# ── Data source (Mock CSV — default profile) ──────────────────────────────────
mosip.certify.mock.datasource.path=/config/certify/data/education-sample.csv

