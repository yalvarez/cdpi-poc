# =============================================================================
# Inji Certify Configuration — CDPI PoC
# =============================================================================
# Core configuration for credential issuance via OID4VCI.
# Plugin selection is controlled by CERTIFY_PROFILE env variable:
#   default        → Mock CSV (no DB needed, for PoC testing)
#   postgres-local → PostgreSQL DataProvider (connects to real data source)

server.port=8090
server.servlet.path=/v1/certify

spring.application.name=inji-certify
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://${mosip.certify.database.hostname}:${mosip.certify.database.port}/${mosip.certify.database.name}?currentSchema=certify
spring.datasource.username=${CERTIFY_DB_USER:certify_user}
spring.datasource.password=${db.dbuser.password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}

# ── Authorization Server (eSignet) ──────────────────────────────────────────
mosip.certify.authorization.url=${mosip.certify.authorization.url}
mosip.certify.authn.issuer-uri=${mosip.certify.authorization.url}/v1/esignet
mosip.certify.authn.jwk-set-uri=${mosip.certify.authorization.url}/v1/esignet/oauth/.well-known/jwks.json
mosip.certify.authn.filter-urls={'/v1/certify/issuance/credential','/v1/certify/issuance/vd11/credential','/v1/certify/issuance/vd12/credential'}
mosip.certify.authn.allowed-audiences={'${mosip.certify.domain.url}/v1/certify/issuance/credential','${mosip.certify.authorization.url}/v1/esignet/vci/credential'}

# ── Issuer metadata ──────────────────────────────────────────────────────────
mosip.certify.domain.url=${mosip.certify.domain.url}
mosip.certify.issuer-id=${mosip.certify.domain.url}/v1/certify

# ── OID4VCI well-known configuration ────────────────────────────────────────
mosip.certify.identifier=${mosip.certify.domain.url}/v1/certify
mosip.certify.authorization-servers={'${mosip.certify.authorization.url}/v1/esignet'}

# ── Key manager (SoftHSM — fully containerized) ─────────────────────────────
mosip.kernel.keymanager.hsm.config-path=${mosip.kernel.keymanager.hsm.config-path}
mosip.kernel.keymanager.hsm.keystore-type=${mosip.kernel.keymanager.hsm.keystore-type}
mosip.kernel.keymanager.hsm.keystore-pass=${CERTIFY_KEYSTORE_PASSWORD}

# ── Credential formats supported ─────────────────────────────────────────────
# Both SD-JWT VC and W3C VCDM v1.1 / v2.0 are supported
mosip.certify.supported.credential.formats={'vc+sd-jwt','ldp_vc'}

# ── Credential configurations (defined per schema in separate property files) ─
# See: config/certify/certify-employment.properties
#      config/certify/certify-education.properties
#      etc.

# ── Cache ─────────────────────────────────────────────────────────────────────
mosip.certify.cache.size={'userinfo': 200, 'templatecache': 20}
mosip.certify.cache.expire-in-seconds={'userinfo': 3600}
mosip.certify.access-token-expire-seconds=3600

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.io.mosip=INFO
logging.level.org.springframework.security=WARN
