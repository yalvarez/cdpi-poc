# =============================================================================
# Inji Certify Configuration — CDPI PoC
# =============================================================================
# Core configuration for credential issuance via OID4VCI.
# Plugin selection is controlled by CERTIFY_PROFILE env variable:
#   default        → Mock CSV (no DB needed, for PoC testing)
#   postgres-local → PostgreSQL DataProvider (connects to real data source)

server.port=8090
server.servlet.path=/v1/certify

spring.application.name=inji-certify
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://${mosip.certify.database.hostname}:${mosip.certify.database.port}/${mosip.certify.database.name}?currentSchema=certify
spring.datasource.username=${POSTGRES_USER:inji}
spring.datasource.password=${db.dbuser.password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}

# ── Authorization Server (eSignet) ──────────────────────────────────────────
mosip.certify.authorization.url=${mosip.certify.authorization.url}
mosip.certify.authn.issuer-uri=${mosip.certify.authn.issuer-uri}
mosip.certify.authn.jwk-set-uri=${mosip.certify.authorization.url}/oauth/.well-known/jwks.json
mosip.certify.authn.filter-urls={'/v1/certify/issuance/credential','/v1/certify/issuance/vd11/credential','/v1/certify/issuance/vd12/credential'}
mosip.certify.authn.allowed-audiences={'${mosip.certify.domain.url}/v1/certify/issuance/credential','${mosip.certify.authorization.url}/v1/esignet/vci/credential'}

# ── Issuer metadata ──────────────────────────────────────────────────────────
mosip.certify.domain.url=${mosip.certify.domain.url}
mosip.certify.issuer-id=${mosip.certify.domain.url}/v1/certify

# ── OID4VCI well-known configuration ────────────────────────────────────────
mosip.certify.identifier=${mosip.certify.domain.url}/v1/certify
mosip.certify.authorization-servers={'${mosip.certify.authorization.url}/v1/esignet'}

# ── Key manager (SoftHSM — fully containerized) ─────────────────────────────
mosip.kernel.keymanager.hsm.config-path=${mosip.kernel.keymanager.hsm.config-path}
mosip.kernel.keymanager.hsm.keystore-type=${mosip.kernel.keymanager.hsm.keystore-type}
mosip.kernel.keymanager.hsm.keystore-pass=${CERTIFY_KEYSTORE_PASSWORD}

# ── Credential formats supported ─────────────────────────────────────────────
mosip.certify.supported.credential.formats={'vc+sd-jwt','ldp_vc'}

# ── Active credential scopes (all 4 CDPI types) ───────────────────────────────
mosip.certify.supported.credential.scopes=EmploymentCertification,EducationalCredential,ProfessionalLicense,CivilIdentity

# ── Credential key-values (format, vct, signing alg — all types) ─────────────
mosip.certify.key-values={\
  'EmploymentCertification':{'format':'vc+sd-jwt','scope':'EmploymentCertification','cryptographic_binding_methods_supported':['did:jwk','jwk'],'credential_signing_alg_values_supported':['ES256'],'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},'vct':'https://schemas.cdpi-poc.local/employment/v1','credential_definition':{'type':['VerifiableCredential','EmploymentCertification']}},\
  'EducationalCredential':{'format':'vc+sd-jwt','scope':'EducationalCredential','cryptographic_binding_methods_supported':['did:jwk','jwk'],'credential_signing_alg_values_supported':['ES256'],'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},'vct':'https://schemas.cdpi-poc.local/education/v1','credential_definition':{'type':['VerifiableCredential','EducationalCredential']}},\
  'ProfessionalLicense':{'format':'vc+sd-jwt','scope':'ProfessionalLicense','cryptographic_binding_methods_supported':['did:jwk','jwk'],'credential_signing_alg_values_supported':['ES256'],'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},'vct':'https://schemas.cdpi-poc.local/professional-license/v1','credential_definition':{'type':['VerifiableCredential','ProfessionalLicense']}},\
  'CivilIdentity':{'format':'vc+sd-jwt','scope':'CivilIdentity','cryptographic_binding_methods_supported':['did:jwk','jwk'],'credential_signing_alg_values_supported':['ES256'],'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},'vct':'https://schemas.cdpi-poc.local/civil-identity/v1','credential_definition':{'type':['VerifiableCredential','CivilIdentity']}}\
}

# ── Credential display metadata ────────────────────────────────────────────────
mosip.certify.credential-display={\
  'EmploymentCertification':[{'name':'Employment Certification','locale':'en','background_color':'#1A5EA0','text_color':'#FFFFFF'},{'name':'Certificación de Empleo','locale':'es','background_color':'#1A5EA0','text_color':'#FFFFFF'}],\
  'EducationalCredential':[{'name':'Educational Credential','locale':'en','background_color':'#27500A','text_color':'#FFFFFF'},{'name':'Credencial Educativa','locale':'es','background_color':'#27500A','text_color':'#FFFFFF'}],\
  'ProfessionalLicense':[{'name':'Professional License','locale':'en','background_color':'#3C3489','text_color':'#FFFFFF'},{'name':'Licencia Profesional','locale':'es','background_color':'#3C3489','text_color':'#FFFFFF'}],\
  'CivilIdentity':[{'name':'Civil Identity','locale':'en','background_color':'#854F0B','text_color':'#FFFFFF'},{'name':'Identidad Civil','locale':'es','background_color':'#854F0B','text_color':'#FFFFFF'}]\
}

# ── Claim display labels (wallet UI) ──────────────────────────────────────────
mosip.certify.claims-display={\
  'EmploymentCertification':{'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],'employer_name':[{'locale':'en','label':'Employer'},{'locale':'es','label':'Empleador'}],'employment_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}],'position_title':[{'locale':'en','label':'Position'},{'locale':'es','label':'Cargo'}],'employment_start_date':[{'locale':'en','label':'Start Date'},{'locale':'es','label':'Fecha Inicio'}],'gross_salary':[{'locale':'en','label':'Monthly Salary'},{'locale':'es','label':'Salario Mensual'}]},\
  'EducationalCredential':{'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],'institution_name':[{'locale':'en','label':'Institution'},{'locale':'es','label':'Institución'}],'credential_title':[{'locale':'en','label':'Degree / Title'},{'locale':'es','label':'Título / Grado'}],'credential_level':[{'locale':'en','label':'Academic Level'},{'locale':'es','label':'Nivel Académico'}],'field_of_study':[{'locale':'en','label':'Field of Study'},{'locale':'es','label':'Área de Estudio'}],'graduation_date':[{'locale':'en','label':'Graduation Date'},{'locale':'es','label':'Fecha de Graduación'}],'credential_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}]},\
  'ProfessionalLicense':{'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],'profession':[{'locale':'en','label':'Profession'},{'locale':'es','label':'Profesión'}],'license_number':[{'locale':'en','label':'License Number'},{'locale':'es','label':'Número de Licencia'}],'issuing_body':[{'locale':'en','label':'Issuing Body'},{'locale':'es','label':'Entidad Emisora'}],'license_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}],'issue_date':[{'locale':'en','label':'Issue Date'},{'locale':'es','label':'Fecha de Emisión'}],'expiry_date':[{'locale':'en','label':'Expiry Date'},{'locale':'es','label':'Fecha de Vencimiento'}]},\
  'CivilIdentity':{'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],'document_number':[{'locale':'en','label':'Document Number'},{'locale':'es','label':'Número de Cédula'}],'document_type':[{'locale':'en','label':'Document Type'},{'locale':'es','label':'Tipo de Documento'}],'nationality':[{'locale':'en','label':'Nationality'},{'locale':'es','label':'Nacionalidad'}],'credential_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}],'issuing_authority':[{'locale':'en','label':'Issuing Authority'},{'locale':'es','label':'Autoridad Emisora'}]}\
}

# ── SD-JWT selectively disclosable claims ─────────────────────────────────────
mosip.certify.sd-jwt.disclosable-claims={\
  'EmploymentCertification':['birthdate','document_number','nationality','employer_id','employer_sector','employment_type','department','employment_end_date','gross_salary','salary_currency'],\
  'EducationalCredential':['birthdate','document_number','nationality','institution_id','institution_accreditation','program_code','enrollment_start_date','final_grade','honors','registration_number'],\
  'ProfessionalLicense':['birthdate','document_number','nationality','profession_code','issuing_body_id','last_renewal_date','practice_regions','sanctions_or_restrictions','qualification_basis'],\
  'CivilIdentity':['full_name','document_expiry','birthdate','birthplace','birth_country','gender','age_over_18','age_over_21','age_over_65','address_street','address_municipality','address_province','address_country','address_postal_code','phone_number','email','marital_status','tax_id','registry_entry_number']\
}

# ── Mock datasource (DataProvider plugin — CSV files per credential type) ──────
# CERTIFY_PROFILE=default uses EmploymentCertification by default.
# Per-type routing requires certify-with-plugins >= 0.14.0 or a custom DataProvider.
# See: config/certify/certify-employment.properties (and education/professional-license/civil-identity)
# for per-type profile overrides when running single-credential deployments.
mosip.certify.mock.datasource.path=/config/certify/data/employment-sample.csv

# ── Cache ─────────────────────────────────────────────────────────────────────
mosip.certify.cache.size={'userinfo': 200, 'templatecache': 20}
mosip.certify.cache.expire-in-seconds={'userinfo': 3600}
mosip.certify.access-token-expire-seconds=3600

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.io.mosip=INFO
logging.level.org.springframework.security=WARN
