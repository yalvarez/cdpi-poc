# =============================================================================
# Inji Certify — profile-default supplement (CDPI PoC)
# =============================================================================
# Spring Boot loads this when SPRING_PROFILES_ACTIVE=default (CERTIFY_PROFILE=default).
# Provides properties that live in the bundled application-local.properties but
# are NOT loaded when SPRING_CONFIG_LOCATION replaces the classpath search.

# --- Integration plugin selection (mock CSV — no external DB needed) ----------
mosip.certify.integration.scan-base-package=io.mosip.certify.mock.integration
mosip.certify.integration.audit-plugin=LoggerAuditService
mosip.certify.integration.data-provider-plugin=MockCSVDataProviderPlugin

# --- Plugin mode -------------------------------------------------------------
mosip.certify.plugin-mode=DataProvider
mosip.certify.data-provider-plugin.issuer.vc-sign-algo=Ed25519Signature2020

# --- Mock data provider config (reads mounted employment-sample.csv) ----------
mosip.certify.mock.data-provider.csv.identifier-column=id
mosip.certify.mock.data-provider.csv.data-columns=id,given_name,family_name,birthdate,document_number,nationality,employer_name,employer_id,employer_sector,employment_status,employment_type,position_title,department,employment_start_date,gross_salary,salary_currency,issuer_name,certificate_number
mosip.certify.mock.data-provider.csv-registry-uri=/config/certify/data/employment-sample.csv
mosip.certify.mock.vciplugin.verification-method=${mosip.certify.authn.jwk-set-uri}
mosip.certify.mock.authenticator.get-identity-url=http://mock-identity-system:8082/v1/mock-identity-system/identity

# --- Security ignore URL patterns --------------------------------------------
mosip.certify.security.auth.post-urls={}
mosip.certify.security.auth.put-urls={}
mosip.certify.security.auth.get-urls={}
mosip.certify.security.ignore-csrf-urls=/actuator/**,${server.servlet.path}/actuator/**,/favicon.ico,/error,\
  /.well-known/**,\
  ${server.servlet.path}/swagger-ui/**,${server.servlet.path}/v3/api-docs/**,\
  ${server.servlet.path}/issuance/**,${server.servlet.path}/system-info/**,\
  ${server.servlet.path}/credential-configurations/**,${server.servlet.path}/.well-known/**,\
  ${server.servlet.path}/ledger-search/**,${server.servlet.path}/credentials/**
mosip.certify.security.ignore-auth-urls=/actuator/**,${server.servlet.path}/actuator/**,/error,\
  /.well-known/**,\
  ${server.servlet.path}/swagger-ui/**,${server.servlet.path}/v3/api-docs/**,\
  ${server.servlet.path}/issuance/**,${server.servlet.path}/system-info/**,\
  ${server.servlet.path}/rendering-template/**,${server.servlet.path}/credential-configurations/**,\
  ${server.servlet.path}/.well-known/**,${server.servlet.path}/ledger-search/**,${server.servlet.path}/credentials/**
mosip.certify.security.cors-enabled-get-method-urls=${server.servlet.path}/rendering-template/**

# --- Cache security (required by AppConfig, even with simple cache type) ------
mosip.certify.cache.security.secretkey.reference-id=TRANSACTION_CACHE
mosip.certify.cache.security.secretkey.application-id=KERNEL
mosip.certify.cache.security.algorithm-name=AES/ECB/PKCS5Padding

# --- Cache: in-memory (simple) — same as bundled local config ----------------
spring.cache.type=simple
management.health.redis.enabled=false
mosip.certify.cache.names=userinfo,vcissuance,templatecache,certificatedatacache,credentialConfig,renderTemplate
spring.cache.cache-names=${mosip.certify.cache.names}
mosip.certify.access-token-expire-seconds=86400
mosip.certify.templatecache-expire-seconds=43200
mosip.certify.certificatedatacache-expire-seconds=3600
mosip.certify.common.cache-expire-seconds=3600
mosip.certify.cache.expire-in-seconds={'userinfo': ${mosip.certify.access-token-expire-seconds}, 'vcissuance': ${mosip.certify.access-token-expire-seconds}, 'templatecache': ${mosip.certify.templatecache-expire-seconds}, 'certificatedatacache': ${mosip.certify.certificatedatacache-expire-seconds}, 'credentialConfig': ${mosip.certify.common.cache-expire-seconds}, 'renderTemplate': ${mosip.certify.common.cache-expire-seconds}}
mosip.certify.cache.size={'userinfo': 200, 'vcissuance': 2000, 'templatecache': 20}

# --- JWT proof alg -----------------------------------------------------------
mosip.certify.supported.jwt-proof-alg={'RS256','PS256','ES256'}

# --- Credential config (binding methods, signing algs, proof types) ----------
mosip.certify.credential-config.cryptographic-binding-methods-supported={\
  'ldp_vc': {'did:jwk','did:web'},\
  'mso_mdoc': {'cose_key'},\
  'vc+sd-jwt': {'did:jwk','did:web'}\
}
mosip.certify.credential-config.credential-signing-alg-values-supported={\
  'RsaSignature2018': {'RS256'},\
  'Ed25519Signature2018': {'EdDSA'},\
  'Ed25519Signature2020': {'EdDSA'},\
  'EcdsaKoblitzSignature2016': {'ES256K'},\
  'EcdsaSecp256k1Signature2019': {'ES256K'},\
  'EcdsaSecp256r1Signature2019': {'ES256'},\
  'ecdsa-rdfc-2019': {'ES256'},\
  'ecdsa-jcs-2019': {'ES256'},\
  'eddsa-rdfc-2022': {'EdDSA'},\
  'eddsa-jcs-2022': {'EdDSA'}\
}
mosip.certify.credential-config.proof-types-supported={\
  'jwt': {'proof_signing_alg_values_supported': {'RS256', 'PS256', 'ES256', 'EdDSA'}}\
}
mosip.certify.credential-config.issuer.display={{'name': 'CDPI PoC Issuer','locale': 'en'}}

# --- Signature algo → key alias mapping ------------------------------------
mosip.certify.signature-algo.key-alias-mapper={\
  'RS256': {{'CERTIFY_VC_SIGN_RSA', ''}},\
  'EdDSA': {{'CERTIFY_VC_SIGN_ED25519', 'ED25519_SIGN'}},\
  'ES256K': {{'CERTIFY_VC_SIGN_EC_K1', 'EC_SECP256K1_SIGN'}},\
  'ES256': {{'CERTIFY_VC_SIGN_EC_R1', 'EC_SECP256R1_SIGN'}}\
}

# --- Ledger ------------------------------------------------------------------
mosip.certify.issuer.ledger-enabled=false
mosip.certify.data-provider-plugin.credential-status.allowed-status-purposes={'revocation'}

# --- Discovery ---------------------------------------------------------------
mosip.certify.discovery.issuer-id=${mosip.certify.domain.url}${server.servlet.path}
mosip.certify.data-provider-plugin.rendering-template-id=5b9c2a12-810a-7388-2dc8-13ee7ad88bac
mosip.certify.data-provider-plugin.issuer-public-key-uri=https://vharsh.github.io/DID/mock-rsa.json
mosip.certify.data-provider-plugin.did-url=did:web:jainhitesh9998.github.io:tempfiles:vc-local-ed25519

# --- JPA / Hibernate ---------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.hibernate.ddl-auto=update

# --- Key manager health (disabled — avoids needing CERTIFY_SERVICE key policy) -
mosip.kernel.keymgr.hsm.health.check.enabled=false
mosip.kernel.keymgr.hsm.health.key.app-id=CERTIFY_SERVICE
mosip.kernel.keymgr.hsm.healthkey.ref-id=TRANSACTION_CACHE
mosip.kernel.keymgr.hsm.health.check.encrypt=false

# --- Crypto properties -------------------------------------------------------
mosip.kernel.crypto.asymmetric-algorithm-name=RSA/ECB/OAEPWITHSHA-256ANDMGF1PADDING
mosip.kernel.crypto.symmetric-algorithm-name=AES/GCM/NoPadding
mosip.kernel.keygenerator.asymmetric-algorithm-name=RSA
mosip.kernel.keygenerator.symmetric-algorithm-name=AES
mosip.kernel.keygenerator.asymmetric-key-length=2048
mosip.kernel.keygenerator.symmetric-key-length=256
mosip.kernel.data-key-splitter=#KEY_SPLITTER#
mosip.kernel.crypto.gcm-tag-length=128
mosip.kernel.crypto.hash-algorithm-name=PBKDF2WithHmacSHA512
mosip.kernel.crypto.hash-symmetric-key-length=256
mosip.kernel.crypto.hash-iteration=100000
mosip.kernel.crypto.sign-algorithm-name=RS256
mosip.kernel.certificate.sign.algorithm=SHA256withRSA
mosip.kernel.keymanager-service-validate-url=https://mosip.hostname/keymanager/validate
mosip.kernel.keymanager.jwtsign.validate.json=false
mosip.keymanager.dao.enabled=false
crypto.PrependThumbprint.enable=true

# --- Certificate defaults ----------------------------------------------------
mosip.kernel.keymanager.certificate.default.common-name=www.mosip.io
mosip.kernel.keymanager.certificate.default.organizational-unit=MOSIP-TECH-CENTER
mosip.kernel.keymanager.certificate.default.organization=IITB
mosip.kernel.keymanager.certificate.default.location=BANGALORE
mosip.kernel.keymanager.certificate.default.state=KA
mosip.kernel.keymanager.certificate.default.country=IN
mosip.kernel.keymanager.softhsm.certificate.common-name=www.mosip.io
mosip.kernel.keymanager.softhsm.certificate.organizational-unit=MOSIP
mosip.kernel.keymanager.softhsm.certificate.organization=IITB
mosip.kernel.keymanager.softhsm.certificate.country=IN
mosip.kernel.partner.sign.masterkey.application.id=PMS
mosip.kernel.partner.allowed.domains=DEVICE
