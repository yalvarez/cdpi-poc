# =============================================================================
# Inji Certify — Employment Certification Credential Configuration
# =============================================================================
# This file defines the credential schema, OID4VCI config, and data source
# for the Employment Certification use case.
#
# Credential type: EmploymentCertification
# Format: SD-JWT VC (vc+sd-jwt)
# Plugin: DataProvider (PostgreSQL) or Mock CSV (default profile)
# =============================================================================

# ── Plugin mode ──────────────────────────────────────────────────────────────
# VCIssuance = plugin handles full VC creation and signing
# DataProvider = certify fetches data from plugin, creates and signs VC
mosip.certify.plugin-mode=DataProvider

# ── Credential type identifier (vct) ─────────────────────────────────────────
mosip.certify.credential-type=EmploymentCertification

# ── OID4VCI scope for this credential type ───────────────────────────────────
mosip.certify.supported.credential.scopes=EmploymentCertification

# ── Credential format configuration ──────────────────────────────────────────
mosip.certify.key-values={\
  'EmploymentCertification':{\
    'format':'vc+sd-jwt',\
    'scope':'EmploymentCertification',\
    'cryptographic_binding_methods_supported':['did:jwk','jwk'],\
    'credential_signing_alg_values_supported':['ES256'],\
    'proof_types_supported':{'jwt':{'proof_signing_alg_values_supported':['ES256']}},\
    'vct':'https://schemas.cdpi-poc.local/employment/v1',\
    'credential_definition':{\
      'type':['VerifiableCredential','EmploymentCertification']\
    }\
  }\
}

# ── Credential display metadata ───────────────────────────────────────────────
mosip.certify.credential-display={\
  'EmploymentCertification':[\
    {'name':'Employment Certification','locale':'en','background_color':'#1A5EA0','text_color':'#FFFFFF'},\
    {'name':'Certificación de Empleo','locale':'es','background_color':'#1A5EA0','text_color':'#FFFFFF'}\
  ]\
}

# ── Claim display metadata ────────────────────────────────────────────────────
mosip.certify.claims-display={\
  'EmploymentCertification':{\
    'given_name':[{'locale':'en','label':'Given Name'},{'locale':'es','label':'Nombre(s)'}],\
    'family_name':[{'locale':'en','label':'Family Name'},{'locale':'es','label':'Apellido(s)'}],\
    'employer_name':[{'locale':'en','label':'Employer'},{'locale':'es','label':'Empleador'}],\
    'employment_status':[{'locale':'en','label':'Status'},{'locale':'es','label':'Estado'}],\
    'position_title':[{'locale':'en','label':'Position'},{'locale':'es','label':'Cargo'}],\
    'employment_start_date':[{'locale':'en','label':'Start Date'},{'locale':'es','label':'Fecha Inicio'}],\
    'gross_salary':[{'locale':'en','label':'Monthly Salary'},{'locale':'es','label':'Salario Mensual'}]\
  }\
}

# ── Selective disclosure claims ───────────────────────────────────────────────
# Claims listed here will be selectively disclosable in the SD-JWT
mosip.certify.sd-jwt.disclosable-claims={\
  'EmploymentCertification':['birthdate','document_number','nationality','employer_id','employer_sector','employment_type','department','employment_end_date','gross_salary','salary_currency']\
}

# ── Data source (Mock CSV — default profile) ──────────────────────────────────
# For PoC testing: reads from CSV file in /config/certify/data/
# Switch to postgres-local profile to use real DB
mosip.certify.mock.datasource.path=/config/certify/data/employment-sample.csv

# ── Data source (PostgreSQL — postgres-local profile) ────────────────────────
