# =============================================================================
# Mimoto Configuration — CDPI PoC
# BFF (Backend for Frontend) for Inji Web and Inji Mobile
# =============================================================================

server.port=8099
server.servlet.path=/residentmobileapp

spring.application.name=mimoto
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://${mosip.mimoto.database.hostname}:${mosip.mimoto.database.port}/${mosip.mimoto.database.name}?currentSchema=mimoto
spring.datasource.username=${POSTGRES_USER:inji}
spring.datasource.password=${db.dbuser.password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Certify endpoint
mosip.mimoto.certify-service-url=${mosipbox_public_url}:8091/v1/certify

# eSignet endpoint
mosip.mimoto.esignet-service-url=${mosipbox_public_url}:8088/v1/esignet

# OIDC redirect URI (Inji Web)
mosip.mimoto.redirecturi=${mosipbox_public_url}:3001/home

# Issuers config — loaded from file
mosip.mimoto.issuers-config=/config/mimoto/mimoto-issuers-config.json

# Trusted verifiers
mosip.mimoto.trusted-verifiers-config=/config/mimoto/mimoto-trusted-verifiers.json

# Keystore for signing (same PKCS12 used by Inji Web for secure download)
mosip.mimoto.p12.path=/certs/oidckeystore.p12
mosip.mimoto.p12.password=${CERTIFY_KEYSTORE_PASSWORD}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.io.mosip=INFO
