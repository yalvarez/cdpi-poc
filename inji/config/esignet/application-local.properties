  'consent.screen.timeout-buffer-in-secs': 5, 'linked-transaction-expire-in-secs': 240, 'sbi.port.range': '4501-4600', \
  'sbi.bio.subtypes.iris': 'UNKNOWN', 'sbi.bio.subtypes.finger': 'UNKNOWN', 'wallet.qr-code-buffer-in-secs': 10, \
  'otp.length': 6, \
  'password.regex': '^.{8,20}$', \
  'password.max-length': 20, \
  'username.regex': '.*',\
  'username.prefix': '', \
  'username.postfix': '', \
  'username.max-length': 12, \
  'username.input-type': 'text', 'wallet.config': {{'wallet.name':  'Inji Wallet', 'wallet.logo-url': '/images/qr_code.png', 'wallet.download-uri': '#', 'wallet.deep-link-uri': 'io.mosip.residentapp.inji://wla-auth?linkCode=LINK_CODE&linkExpireDateTime=LINK_EXPIRE_DT' }}, \
  'signup.config': {'signup.banner': false, 'signup.url': 'http://localhost:8089/signup'}, \
  'forgot-password.config': {'forgot-password': false, 'forgot-password.url': 'http://localhost:8089/reset-password'}, \
  'eKYC-steps.config': 'http://localhost:8089/identity-verification', \
  'error.banner.close-timer': 10,\
