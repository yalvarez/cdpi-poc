# =============================================================================
# eSignet Configuration — CDPI PoC
# =============================================================================
# This is a minimal configuration for PoC use.
# eSignet acts as the Authorization Server (OIDC) for Inji Certify.
# On Day 5 this entire service is bypassed in favour of the country's real OIDC.

server.port=8088
server.servlet.path=/v1/esignet

spring.application.name=esignet
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:postgresql://${mosip.esignet.database.hostname}:${mosip.esignet.database.port}/${mosip.esignet.database.name}?currentSchema=esignet
spring.datasource.username=${ESIGNET_DB_USER:esignet_user}
spring.datasource.password=${db.dbuser.password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis cache
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD}

# OIDC issuer metadata
mosip.esignet.discovery.issuer-id=${mosipbox_public_url}/v1/esignet

# Token lifetimes
mosip.esignet.access-token-expire-seconds=3600
mosip.esignet.id-token-expire-seconds=3600

# Supported scopes — add credential-specific scopes here
mosip.esignet.supported.authorize.scopes=openid,profile,email,EmploymentCertification,EducationalCredential,ProfessionalLicense,CivilIdentity

# Supported credential scopes mapped to certify
mosip.esignet.credential.scope-resource-mapping={'EmploymentCertification':'${mosipbox_public_url}/v1/certify','EducationalCredential':'${mosipbox_public_url}/v1/certify','ProfessionalLicense':'${mosipbox_public_url}/v1/certify','CivilIdentity':'${mosipbox_public_url}/v1/certify'}

# Mock authentication plugin (for PoC — no real identity system needed)
mosip.esignet.authenticator.impl-class=io.mosip.esignet.mock.MockAuthenticationService
mosip.esignet.mock.authenticate.policy={"UIN":{"1234567890":"111111"}}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.io.mosip=INFO
logging.level.org.springframework.security=WARN
