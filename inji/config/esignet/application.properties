# =============================================================================
# eSignet Configuration — CDPI PoC (comprehensive)
# =============================================================================
# active_profile_env=local skips HSM install but means bundled
# application-default.properties is not loaded (SPRING_CONFIG_LOCATION
# replaces default classpath search). This file provides everything needed.

# --- Server (from bootstrap.properties which IS loaded via Spring Cloud) -----
server.port=8088
server.servlet.path=/v1/esignet
spring.application.name=esignet
spring.main.allow-bean-definition-overriding=true
spring.datasource.hikari.data-source-properties=stringtype=unspecified

# --- Database (override local defaults) --------------------------------------
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mosip_db}?currentSchema=esignet
spring.datasource.username=${POSTGRES_USER:inji}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL95Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# --- Redis cache -------------------------------------------------------------
spring.cache.type=redis
spring.redis.host=${REDIS_HOST:-redis}
spring.redis.port=${REDIS_PORT:-6379}
spring.redis.password=${REDIS_PASSWORD}
management.health.redis.enabled=false

# --- Kafka disabled (no Kafka in PoC) ----------------------------------------
kafka.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration,org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration
spring.kafka.bootstrap-servers=localhost:9092
# Topic names are required by @Value injection even when Kafka is disabled
mosip.esignet.kafka.linked-session.topic=esignet-linked
mosip.esignet.kafka.linked-auth-code.topic=esignet-consented

# --- Security: disable JWT resource server auth (no Keycloak in PoC) ---------
mosip.esignet.security.auth.post-urls={}
mosip.esignet.security.auth.put-urls={}
mosip.esignet.security.auth.get-urls={}
spring.security.oauth2.resourceserver.jwt.issuer-uri=
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=

# --- eSignet core config (from application-default.properties) ---------------
mosip.esignet.auth-txn-id-length=10
mosip.esignet.supported-id-regex=\\S*
mosip.esignet.link-code-expire-in-secs=600
mosip.esignet.generate-link-code.limit-per-transaction=10
mosip.esignet.authentication-expire-in-secs=600
mosip.esignet.preauthentication-expire-in-secs=600
mosip.esignet.client-assertion-jwt.leeway-seconds=5
mosip.esignet.signup-id-token-expire-seconds=300
mosip.esignet.signup.halt.expire-seconds=1800

# --- Auth challenge formats --------------------------------------------------
mosip.esignet.auth-challenge.OTP.format=alpha-numeric
mosip.esignet.auth-challenge.OTP.min-length=6
mosip.esignet.auth-challenge.OTP.max-length=6
mosip.esignet.auth-challenge.PWD.format=alpha-numeric
mosip.esignet.auth-challenge.PWD.min-length=8
mosip.esignet.auth-challenge.PWD.max-length=30
mosip.esignet.auth-challenge.BIO.format=encoded-json
mosip.esignet.auth-challenge.BIO.min-length=500
mosip.esignet.auth-challenge.BIO.max-length=500000
mosip.esignet.auth-challenge.WLA.format=jwt
mosip.esignet.auth-challenge.WLA.min-length=500
mosip.esignet.auth-challenge.WLA.max-length=1000
mosip.esignet.auth-challenge.KBI.format=base64url-encoded-json
mosip.esignet.auth-challenge.KBI.min-length=50
mosip.esignet.auth-challenge.KBI.max-length=500
mosip.esignet.auth-challenge.PIN.format=number
mosip.esignet.auth-challenge.PIN.min-length=6
mosip.esignet.auth-challenge.PIN.max-length=6
mosip.esignet.auth-challenge.IDT.format=base64url-encoded-json
mosip.esignet.auth-challenge.IDT.min-length=20
mosip.esignet.auth-challenge.IDT.max-length=2000
mosip.esignet.claim-detail.purpose.min-length=3
mosip.esignet.claim-detail.purpose.max-length=300

# --- Header filter paths (required bean — uses server.servlet.path) ----------
mosip.esignet.header-filter.paths-to-validate={'${server.servlet.path}/authorization/send-otp', \
  '${server.servlet.path}/authorization/authenticate', \
  '${server.servlet.path}/authorization/v2/authenticate', \
  '${server.servlet.path}/authorization/v3/authenticate', \
  '${server.servlet.path}/authorization/auth-code', \
  '${server.servlet.path}/authorization/prepare-signup-redirect', \
  '${server.servlet.path}/authorization/claim-details', \
  '${server.servlet.path}/authorization/complete-signup-redirect' }

# --- Captcha disabled --------------------------------------------------------
mosip.esignet.captcha.required=
mosip.esignet.captcha.site-key=test-site-key
mosip.esignet.captcha.validator-url=http://captcha.captcha/v1/captcha/validatecaptcha
mosip.esignet.captcha.module-name=esignet

# --- Supported values --------------------------------------------------------
mosip.esignet.supported.authorize.scopes={'openid','profile','email','EmploymentCertification','EducationalCredential','ProfessionalLicense','CivilIdentity'}
mosip.esignet.supported.openid.scopes={'profile','email','phone'}
mosip.esignet.openid.scope.claims={'profile' : {'name','address','gender','birthdate','picture','email','phone_number','phone_number_verified','updated_at'},'email' : {'email'}, 'phone' : {'phone_number'}}
mosip.esignet.supported.credential.scopes={'EmploymentCertification','EducationalCredential','ProfessionalLicense','CivilIdentity'}
mosip.esignet.credential.scope-resource-mapping={'EmploymentCertification':'${mosipbox_public_url}/v1/certify','EducationalCredential':'${mosipbox_public_url}/v1/certify','ProfessionalLicense':'${mosipbox_public_url}/v1/certify','CivilIdentity':'${mosipbox_public_url}/v1/certify'}
mosip.esignet.supported.response.types={'code'}
mosip.esignet.supported.grant.types={'authorization_code'}
mosip.esignet.supported.ui.displays={'page','popup','touch','wap'}
mosip.esignet.supported.ui.prompts={'none','login','consent','select_account'}
mosip.esignet.supported.client.assertion.types={'urn:ietf:params:oauth:client-assertion-type:jwt-bearer'}
mosip.esignet.supported.client.auth.methods={'private_key_jwt'}
mosip.esignet.supported-pkce-methods={'S256'}

# --- Token lifetimes ---------------------------------------------------------
mosip.esignet.access-token-expire-seconds=3600
mosip.esignet.id-token-expire-seconds=3600

# --- Discovery ---------------------------------------------------------------
mosip.esignet.domain.url=${mosipbox_public_url}
mosip.esignet.discovery.issuer-id=${mosip.esignet.domain.url}/v1/esignet
mosip.esignet.jwks-uri=${mosip.esignet.domain.url}/.well-known/jwks.json
mosip.esignet.token.endpoint=${mosip.esignet.domain.url}/v1/esignet/oauth/v2/token
mosip.signup.domain.url=http://localhost:8089

# --- Cache config ------------------------------------------------------------
mosip.esignet.cache.secure.individual-id=true
mosip.esignet.cache.store.individual-id=true
mosip.esignet.cache.security.secretkey.reference-id=TRANSACTION_CACHE
mosip.esignet.cache.security.algorithm-name=AES/ECB/PKCS5Padding
mosip.esignet.cache.key.hash.algorithm=SHA3-256
mosip.esignet.cache.names=clientdetails,preauth,authenticated,authcodegenerated,userinfo,linkcodegenerated,linked,linkedcode,linkedauth,consented,authtokens,bindingtransaction,apiratelimit,blocked,halted,nonce
spring.cache.cache-names=${mosip.esignet.cache.names}

mosip.esignet.cache.size={'clientdetails':200,'preauth':200,'authenticated':200,\
  'authcodegenerated':200,'userinfo':200,'linkcodegenerated':500,'linked':200,\
  'linkedcode':200,'linkedauth':200,'consented':200,'authtokens':2,\
  'bindingtransaction':200,'apiratelimit':500,'blocked':500,'halted':500,'nonce':500}

mosip.esignet.cache.expire-in-seconds={'clientdetails':86400,'preauth':600,'authenticated':600,'authcodegenerated':600,'userinfo':3600,'linkcodegenerated':600,'linked':600,'linkedcode':600,'linkedauth':600,'consented':600,'authtokens':7200,'bindingtransaction':600,'apiratelimit':180,'blocked':300,'halted':1800,'nonce':86400}

# --- Security ignore lists (permit authorization & public endpoints) ----------
mosip.esignet.security.ignore-csrf-urls=${server.servlet.path}/oidc/**,${server.servlet.path}/oauth/**,\
  ${server.servlet.path}/actuator/**,/favicon.ico,${server.servlet.path}/error,\
  ${server.servlet.path}/swagger-ui/**,${server.servlet.path}/v3/api-docs/**,\
  ${server.servlet.path}/linked-authorization/**,${server.servlet.path}/binding/**,\
  ${server.servlet.path}/client-mgmt/**,${server.servlet.path}/system-info/**
mosip.esignet.security.ignore-auth-urls=${server.servlet.path}/csrf/**,${server.servlet.path}/authorization/**,\
  ${server.servlet.path}/linked-authorization/**,${server.servlet.path}/oidc/**,\
  ${server.servlet.path}/oauth/**,${server.servlet.path}/actuator/**,/favicon.ico,\
  ${server.servlet.path}/error,${server.servlet.path}/swagger-ui/**,\
  ${server.servlet.path}/v3/api-docs/**,${server.servlet.path}/binding/**,\
  ${server.servlet.path}/client-mgmt/**,${server.servlet.path}/system-info/**

# --- Binding -----------------------------------------------------------------
mosip.esignet.binding.salt-length=16
mosip.esignet.binding.audience-id=esignet-binding
mosip.esignet.binding.key-expire-days=10

# --- KBI field config (empty for mock) ---------------------------------------
mosip.esignet.authenticator.default.auth-factor.kbi.individual-id-field=
mosip.esignet.authenticator.default.auth-factor.kbi.field-details={}

# --- AMR/ACR mapping ---------------------------------------------------------
mosip.esignet.amr-acr-mapping-file-path=amr_acr_mapping.json

# --- Claim schema ------------------------------------------------------------
mosip.esignet.claims.schema.url=classpath:/verified_claims_request_schema.json

# --- Mock plugin config ------------------------------------------------------
mosip.esignet.integration.scan-base-package=io.mosip.esignet.plugin.mock
mosip.esignet.integration.authenticator=MockAuthenticationService
mosip.esignet.integration.key-binder=MockKeyBindingWrapperService
mosip.esignet.integration.audit-plugin=LoggerAuditService
mosip.esignet.mock.domain.url=http://mock-identity-system:8082
mosip.esignet.mock.authenticator.send-otp=${mosip.esignet.mock.domain.url}/v1/mock-identity-system/send-otp
mosip.esignet.mock.authenticator.kyc-auth-url=${mosip.esignet.mock.domain.url}/v1/mock-identity-system/v2/kyc-auth
mosip.esignet.mock.authenticator.kyc-exchange-url=${mosip.esignet.mock.domain.url}/v1/mock-identity-system/kyc-exchange
mosip.esignet.mock.authenticator.kyc-exchange-v2-url=${mosip.esignet.mock.domain.url}/v1/mock-identity-system/v2/kyc-exchange
mosip.esignet.mock.authenticator.ida.otp-channels=email,phone
mosip.esignet.mock.supported.bind-auth-factor-types={'WLA'}
mosip.signup.integration.impl.basepackage=io.mosip.signup.plugin.mock
mosip.signup.integration.profile-registry-plugin=MockProfileRegistryPluginImpl
mosip.signup.mock.identity-verification.story-name=mock-idv-user-story.json
mosip.signup.mock.config-server-url=classpath:
mosip.signup.mock.mandatory-attributes.CREATE=fullName,phone,email,gender,password,preferredLang
mosip.signup.mock.mandatory-attributes.UPDATE=
mosip.signup.mock.lang-based-attributes=fullName
mosip.signup.mock.username.field=individualId
mosip.signup.mock.identity.endpoint=${mosip.esignet.mock.domain.url}/v1/mock-identity-system/identity
mosip.signup.mock.get-identity.endpoint=${mosip.esignet.mock.domain.url}/v1/mock-identity-system/identity/
mosip.signup.mock.add-verified-claims.endpoint=${mosip.esignet.mock.domain.url}/v1/mock-identity-system/identity/add-verified-claim

# --- Keystore: PKCS12 (override classpath local: esignet_local.p12/localtest) -
# Uses config-path (same property as PKCS11 but holds the .p12 file path)
mosip.kernel.keymanager.hsm.keystore-type=PKCS12
mosip.kernel.keymanager.hsm.config-path=/certs/oidckeystore.p12
mosip.kernel.keymanager.hsm.keystore-pass=${CERTIFY_KEYSTORE_PASSWORD}

# --- Kernel crypto properties ------------------------------------------------
mosip.kernel.crypto.asymmetric-algorithm-name=RSA/ECB/OAEPWITHSHA-256ANDMGF1PADDING
mosip.kernel.crypto.symmetric-algorithm-name=AES/GCM/PKCS5Padding
mosip.kernel.keygenerator.asymmetric-algorithm-name=RSA
mosip.kernel.keygenerator.symmetric-algorithm-name=AES
mosip.kernel.keygenerator.asymmetric-key-length=2048
mosip.kernel.keygenerator.symmetric-key-length=256
mosip.kernel.data-key-splitter=#KEY_SPLITTER#
mosip.kernel.crypto.gcm-tag-length=128
mosip.kernel.crypto.hash-algorithm-name=PBKDF2WithHmacSHA512
mosip.kernel.crypto.hash-symmetric-key-length=256
mosip.kernel.crypto.hash-iteration=100000
mosip.kernel.crypto.sign-algorithm-name=RS256
mosip.kernel.certificate.sign.algorithm=SHA256withRSA
mosip.kernel.keymanager.certificate.default.common-name=www.mosip.io
mosip.kernel.keymanager.certificate.default.organizational-unit=MOSIP-TECH-CENTER
mosip.kernel.keymanager.certificate.default.organization=IITB
mosip.kernel.keymanager.certificate.default.location=BANGALORE
mosip.kernel.keymanager.certificate.default.state=KA
mosip.kernel.keymanager.certificate.default.country=IN
mosip.kernel.keymanager.softhsm.certificate.common-name=www.mosip.io
mosip.kernel.keymanager.softhsm.certificate.organizational-unit=MOSIP
mosip.kernel.keymanager.softhsm.certificate.organization=IITB
mosip.kernel.keymanager.softhsm.certificate.country=IN
mosip.kernel.partner.sign.masterkey.application.id=PMS
mosip.kernel.partner.allowed.domains=DEVICE
mosip.kernel.keymanager-service-validate-url=https://mosip.hostname/keymanager/validate
mosip.kernel.keymanager.jwtsign.validate.json=false
mosip.keymanager.dao.enabled=false
crypto.PrependThumbprint.enable=true
mosip.kernel.keymgr.hsm.health.check.enabled=false
mosip.kernel.keymgr.hsm.health.key.app-id=OIDC_SERVICE
mosip.kernel.keymgr.hsm.healthkey.ref-id=TRANSACTION_CACHE

# --- Actuator ----------------------------------------------------------------
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# --- Logging -----------------------------------------------------------------
logging.level.io.mosip=INFO
logging.level.org.springframework.security=WARN
